<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Mint $SCHW8BITs</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      min-height: 100vh; overflow-x: hidden; position: relative; color: #fff;
    }
    .animated-bg { position: fixed; inset: 0; z-index: -1; animation: bgShift 12s ease-in-out infinite;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); }
    @keyframes bgShift {
      0%,100%{background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%)}
      25%{background:linear-gradient(135deg,#16a085 0%,#27ae60 100%)}
      50%{background:linear-gradient(135deg,#2980b9 0%,#3498db 100%)}
      75%{background:linear-gradient(135deg,#8e44ad 0%,#9b59b6 100%)}
    }
    .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }
    /* Navigation Bar Styles */
        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 15px 30px;
            margin: 20px auto;
            max-width: 800px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 22px;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar a.active {
            background: rgba(255, 255, 255, 0.3);
        }
    header { text-align: center; padding: 48px 0; }
    .title { font-size: clamp(3.6rem, 8.5vw, 6.5rem); font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,.5); letter-spacing: 0.5px; }
    .subtitle { margin-top: 14px; color: rgba(255,255,255,.95); font-size: clamp(1.15rem, 3vw, 1.4rem); }
    .mint-card {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 24px; padding: 28px;
      margin: 30px auto; max-width: 640px; box-shadow: 0 12px 32px rgba(0,0,0,.25);
    }
    .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border: none; color: #fff;
      padding: 12px 18px; border-radius: 12px; cursor: pointer; font-weight: 700;
      display: inline-flex; align-items: center; gap: 8px; transition: transform .2s ease;
    }
    .btn[disabled] { opacity: .6; cursor: not-allowed; }
    .btn:hover { transform: translateY(-1px); }
    .input {
      background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 12px 14px; border-radius: 12px; width: 140px; text-align: center; font-weight: 700; font-size: 1.1rem;
    }
    .label { opacity: .9; }
    .note { margin-top: 10px; opacity: .9; font-size: .95rem; }
    .addr { display: inline-flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,.2); border-radius: 12px; padding: 10px 12px; font-family: monospace; }

    /* Section wrapper similar to homepage featured card */
    .section-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 32px; margin: 24px auto; }

    /* Floating particles (shapes) like index.html */
    .floating-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .shape { position: absolute; border-radius: 50%; animation: float 6s ease-in-out infinite; }
    .shape:nth-child(1) { width: 80px; height: 80px; background: rgba(255,255,255,0.1); top: 10%; left: 10%; animation-delay: 0s; }
    .shape:nth-child(2) { width: 120px; height: 120px; background: rgba(255,255,255,0.05); top: 60%; right: 10%; animation-delay: 2s; }
    .shape:nth-child(3) { width: 60px; height: 60px; background: rgba(255,255,255,0.08); bottom: 20%; left: 20%; animation-delay: 4s; }
    @keyframes float { 0%,100%{ transform: translateY(0px) rotate(0deg);} 50%{ transform: translateY(-20px) rotate(180deg);} }

    /* Floating emojis like index.html */
    .degen-emojis { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
    .floating-emoji { position: absolute; font-size: 2rem; animation: floatEmoji 15s infinite linear; opacity: 0.7; }
    .floating-emoji:nth-child(1) { left: 10%; animation-delay: 0s; }
    .floating-emoji:nth-child(2) { left: 20%; animation-delay: 2s; }
    .floating-emoji:nth-child(3) { left: 30%; animation-delay: 4s; }
    .floating-emoji:nth-child(4) { left: 60%; animation-delay: 6s; }
    .floating-emoji:nth-child(5) { left: 80%; animation-delay: 8s; }
    .floating-emoji:nth-child(6) { left: 90%; animation-delay: 10s; }
    @keyframes floatEmoji {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    /* Mobile tweaks */
    @media (max-width: 900px) {
      .navbar { max-width: 100%; gap: 18px; padding: 12px 16px; }
      .navbar a { padding: 10px 16px; font-size: .95rem; }
      #mintLayout { grid-template-columns: 1fr; }
      .mint-two-col { grid-template-columns: 1fr !important; }
      .section-card { padding: 20px; border-radius: 22px; }
      header { padding: 32px 0; }
      .title { font-size: clamp(2.2rem, 8vw, 3.2rem); }
    }
  </style>
  <script type="module" crossorigin src="/assets/mint-BlMYv25V.js"></script>
</head>
<body>
  <div class="animated-bg"></div>

  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="degen-emojis">
    <div class="floating-emoji">🚀</div>
    <div class="floating-emoji">💎</div>
    <div class="floating-emoji">🔥</div>
    <div class="floating-emoji">🎲</div>
    <div class="floating-emoji">⚡</div>
    <div class="floating-emoji">🌙</div>
  </div>

    <div class="container" style="display:flex;flex-direction:column;align-items:center;">
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="gallery.html"><i class="fas fa-images"></i> Gallery</a>
      <a href="lore.html"><i class="fas fa-book"></i> Lore</a>
      <a href="mint.html" class="active"><i class="fas fa-fire"></i> Mint</a>
    </nav>

    <header>
      <h1 class="title">Schwepe's $SCHW8BITS</h1>
    </header>

    <!-- Mint panel fills the whole container -->
    <div class="section-card" style="max-width:1200px;width:100%;">
      <aside class="purchase-panel" style="background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);border-radius:22px;padding:28px;width:100%;font-size:1.15rem;">
        <div class="mint-two-col" style="display:grid;grid-template-columns:1.4fr 1fr;gap:24px;align-items:start;width:100%">
          <!-- Left: Preview -->
          <div>
            <div style="width:100%;max-width:520px;aspect-ratio:1/1;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,.25);margin:0 auto;display:flex;align-items:center;justify-content:center">
              <img id="selectedNftPreview" src="https://media.giphy.com/media/Xi6tMKR0EzDMaV8I8R/giphy.gif" alt="Selected" style="width:100%;height:100%;object-fit:cover" />
            </div>
            <div id="selectedNftTitle" style="font-weight:800;font-size:1.3rem;text-align:center;margin-top:12px">Schwepe's $SCHW8BITS</div>
          </div>
          <!-- Right: Controls -->
          <div>
            <div style="display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;justify-content:flex-end;width:100%">
              <button id="connectBtn" class="btn"><i class="fas fa-plug"></i> Connect Wallet</button>
              <button id="disconnectBtn" class="btn" style="display:none;background:linear-gradient(135deg,#777,#999)"><i class="fas fa-power-off"></i> Disconnect</button>
              <div id="walletMenu" style="display:none; position:absolute; margin-top:46px; right:28px; background:rgba(20,20,25,.95); border:1px solid rgba(255,255,255,.15); border-radius:12px; padding:8px; z-index:999; min-width:220px;"></div>
            </div>
            <div style="margin-bottom:16px">
              <div style="font-size:1.2rem;margin-bottom:8px">Quantity</div>
              <input id="qtyInput" type="number" min="1" max="1000" value="1" class="input" style="width:100%" />
            </div>
            <div style="margin:16px 0;border-top:1px solid rgba(255,255,255,.15);padding-top:14px">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Price per NFT</span><strong>FREE</strong></div>
              <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Quantity</span><strong id="summaryQty">1</strong></div>
              <div style="display:flex;justify-content:space-between"><span>Total Price</span><strong>FREE</strong></div>
            </div>
            <button id="buyBtn" class="btn" style="width:100%;justify-content:center;font-size:1.2rem;padding:16px 20px"><i class="fas fa-fire"></i> Buy NFT</button>
            <p id="panelStatus" class="note" style="margin-top:10px"></p>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <!-- Corner Man Element -->
  <div id="corner-man" style="position: fixed; bottom: 0; width: 150px; height: 150px; z-index: 100; cursor: pointer; transition: all 0.8s ease; opacity: 0; transform: translateX(0);">
    <img src="" alt="Corner Man" style="width: 100%; height: 100%; object-fit: stretch;">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</body>
</html>
