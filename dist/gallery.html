<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- SEO Meta Tags -->

    <meta name="keywords" content="schwepe gallery, meme gallery, degen emotions, crypto vibes, 247420, schwepe collection">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://schwepe.247420.xyz/gallery.html">

    <!-- Open Graph Meta Tags -->

    <meta property="og:url" content="https://schwepe.247420.xyz/gallery.html">
    <meta property="og:title" content="Schwepe Gallery - The Complete Schwepe Multiverse">
    <meta property="og:description" content="Every degen emotion, every trading vibe, every 247420 moment captured in pink frog form.">
    <meta property="og:image" content="https://schwepe.247420.xyz/schwepe/schwepe.gif">
    <meta property="og:site_name" content="Schwepe's Meme Dimension">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Schwepe Gallery - The Complete Schwepe Multiverse">
    <meta name="twitter:description" content="Every degen emotion, every trading vibe, every 247420 moment captured in pink frog form.">
    <meta name="twitter:image" content="https://schwepe.247420.xyz/schwepe/schwepe.gif">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            animation: bgShift 10s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); }
            25% { background: linear-gradient(135deg, #16a085 0%, #27ae60 100%); }
            50% { background: linear-gradient(135deg, #2980b9 0%, #3498db 100%); }
            75% { background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            padding: 40px 0 40px;
        }

        /* Navigation Bar Styles */
        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 15px 30px;
            margin: 20px auto;
            max-width: 800px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .navbar a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .back-button:hover {
            transform: translateY(-2px);
        }

        .gallery-title {
            font-size: 3.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .gallery-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .complete-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }

        .schwepe-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .schwepe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .schwepe-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .schwepe-card:hover .schwepe-image {
            transform: scale(1.05);
        }

        .schwepe-title {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .schwepe-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            line-height: 1.5;
        }

        .special-card {
            border: 2px solid #f093fb;
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.2) 0%, rgba(245, 87, 108, 0.2) 100%);
        }

        /* Corner Man Styles */
        .corner-man {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .corner-man.show {
            opacity: 1;
            transform: scale(1);
        }

        .corner-man:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .corner-man img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: transparent;
        }

        @media (max-width: 768px) {
            .complete-gallery {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .gallery-title {
                font-size: 2.5rem;
            }

            .back-button {
                position: relative;
                top: 0;
                left: 0;
                margin: 20px auto;
                display: flex;
                width: fit-content;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div id="corner-man" class="corner-man">
        <img src="cornermen/schwepe-corner-1.png" alt="Corner Man">
    </div>

    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i> Back to Degen HQ
    </a>

    <div class="container">
        <div class="header">
            <h1 class="gallery-title">🎭 The Schwepe Multiverse 🎭</h1>
            <p class="gallery-subtitle">Every degen emotion, every trading vibe, every 247420 moment captured in pink frog form 🐸</p>
        </div>

        <!-- Navigation -->
        <div id="navbar-container"></div>

        <div class="complete-gallery" id="schwepe-gallery">
            <!-- Gallery content will be loaded dynamically from schwepe-descriptions.json -->
        </div>
    </div>

    <script>
        // Load shared navbar
        async function loadNavbar() {
            try {
                const response = await fetch('navbar.html');
                const navbarHTML = await response.text();
                document.getElementById('navbar-container').innerHTML = navbarHTML;

                // Set active state for current page
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                const navLinks = document.querySelectorAll('#navbar-container a');
                navLinks.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });

                console.log('✅ Navbar loaded successfully');
            } catch (error) {
                console.error('❌ Error loading navbar:', error);
            }
        }

        // Load gallery content from JSON
        async function loadGalleryFromJSON() {
            try {
                const response = await fetch('schwepe-descriptions.json');
                const descriptions = await response.json();

                const galleryContainer = document.getElementById('schwepe-gallery');
                galleryContainer.innerHTML = '';

                // Add featured official Schwepe first
                const featuredCard = document.createElement('div');
                featuredCard.className = 'schwepe-card special-card';
                featuredCard.innerHTML = `
                    <img src="schwepe/schwepe.gif" alt="Official Schwepe Logo" class="schwepe-image">
                    <h3 class="schwepe-title">Official $SCHWEPE</h3>
                    <p class="schwepe-description">The official branding and identity of our beloved token</p>
                `;
                galleryContainer.appendChild(featuredCard);

                // Add all other Schwepes
                Object.entries(descriptions).forEach(([filename, data]) => {
                    if (filename === 'schwepe.gif') return; // Skip the featured one

                    const specialClass = data.special ? ' special-card' : '';
                    const card = document.createElement('div');
                    card.className = `schwepe-card${specialClass}`;
                    card.innerHTML = `
                        <img src="schwepe/${filename}" alt="${data.title}" class="schwepe-image">
                        <h3 class="schwepe-title">${data.title}</h3>
                        <p class="schwepe-description">${data.description}</p>
                    `;

                    // Add click interaction
                    card.addEventListener('click', function() {
                        this.style.animation = 'bounce 0.5s ease-in-out';
                        setTimeout(() => {
                            this.style.animation = '';
                        }, 500);
                    });

                    galleryContainer.appendChild(card);
                });

                console.log('✅ Gallery loaded from JSON successfully');
            } catch (error) {
                console.error('❌ Error loading gallery from JSON:', error);
                // Fallback: show error message
                const galleryContainer = document.getElementById('schwepe-gallery');
                galleryContainer.innerHTML = '<p style="color: white; text-align: center; padding: 40px;">Error loading gallery content. Please check back later.</p>';
            }
        }

        // Corner Man functionality
        let cornerManVisible = false;
        let cornerManImages = [];

        function # {
            cornerManVisible = !cornerManVisible;
            const cornerMan = document.getElementById('corner-man');
            if (cornerManVisible) {
                cornerMan.classList.add('show');
                if (cornerManImages.length > 0) {
                    loadRandomCornerImage();
                }
            } else {
                cornerMan.classList.remove('show');
            }
        }

        function loadCornerManImages() {
            // Load corner man images from cornermen folder
            cornerManImages = [
                'cornermen/schwepe-corner-1.png',
                'cornermen/schwepe-corner-2.png',
                'cornermen/schwepe-corner-3.png',
                'cornermen/schwepe-corner-4.png',
                'cornermen/schwepe-corner-5.png'
            ];
        }

        function loadRandomCornerImage() {
            if (cornerManImages.length === 0) return;

            const cornerMan = document.getElementById('corner-man');
            const randomIndex = Math.floor(Math.random() * cornerManImages.length);
            const img = cornerMan.querySelector('img');
            img.src = cornerManImages[randomIndex];

            // Preload next images
            cornerManImages.forEach(imageSrc => {
                const preloadImg = new Image();
                preloadImg.src = imageSrc;
            });
        }

        function showStats() {
            alert('🎯 Schwepe Stats:\n\n' +
                  '• Total Schwepes: 28\n' +
                  '• Special Schwepes: 20\n' +
                  '• Corner Men: 5\n' +
                  '• Degen Energy: 247420%\n' +
                  '• Meme Power: MAXIMUM');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Load shared navbar
            loadNavbar();

            // Load gallery from JSON
            loadGalleryFromJSON();

            // Initialize corner man
            loadCornerManImages();

            // Change corner man image every 30 seconds when visible
            setInterval(() => {
                if (cornerManVisible) {
                    loadRandomCornerImage();
                }
            }, 30000);
        });
    </script>
</body>
</html>
