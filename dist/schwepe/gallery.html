<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>schwepe - Image Gallery</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<meta name="description" content="schwepe Image Gallery - Browse all saved images from the schwepe community.">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="navbar.css">
<style>
:root {
--primary: #00f5ff;
--secondary: #ff006e;
--accent: #ffbe0b;
--bg-dark: #0a0a0a;
--text: #ffffff;
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Fredoka', sans-serif;
background: var(--bg-dark);
color: var(--text);
min-height: 100vh;
padding-top: 80px;
}
.container {
max-width: 1400px;
margin: 0 auto;
padding: 40px 20px;
}
.gallery-header {
text-align: center;
margin-bottom: 50px;
}
.gallery-title {
font-size: 3.5rem;
font-weight: 700;
background: linear-gradient(45deg, var(--secondary), var(--accent), var(--primary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 10px;
}
.gallery-subtitle {
font-size: 1.3rem;
color: var(--primary);
}
.gallery-stats {
text-align: center;
font-size: 1.1rem;
color: #888;
margin-bottom: 30px;
}
.image-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 20px;
}
.image-card {
background: rgba(255, 255, 255, 0.05);
border: 2px solid rgba(0, 245, 255, 0.2);
border-radius: 12px;
overflow: hidden;
transition: all 0.3s ease;
cursor: pointer;
}
.image-card:hover {
transform: translateY(-5px);
border-color: var(--primary);
box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
}
.image-card img {
width: 100%;
height: 280px;
object-fit: cover;
display: block;
}
.image-filename {
padding: 12px;
font-size: 0.85rem;
color: #888;
text-align: center;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.loading {
text-align: center;
color: var(--primary);
font-size: 1.5rem;
padding: 60px;
}
.lightbox {
display: none;
position: fixed;
z-index: 9999;
left: 0;
top: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.95);
}
.lightbox.active {
display: flex;
align-items: center;
justify-content: center;
}
.lightbox-content {
max-width: 90%;
max-height: 90%;
object-fit: contain;
}
.lightbox-close {
position: absolute;
top: 30px;
right: 40px;
color: white;
font-size: 40px;
font-weight: bold;
cursor: pointer;
background: var(--secondary);
width: 50px;
height: 50px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.3s;
}
.lightbox-close:hover {
background: var(--accent);
transform: rotate(90deg);
}
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="container">
<div class="gallery-header">
<h1 class="gallery-title">schwepe Image Gallery</h1>
<p class="gallery-subtitle">[ Community Image Archive ]</p>
</div>
<div class="gallery-stats" id="image-count">Loading images...</div>
<div class="image-grid" id="image-grid">
<div class="loading">Loading gallery...</div>
</div>
</div>

<div class="lightbox" id="lightbox">
<span class="lightbox-close" id="lightbox-close">&times;</span>
<img class="lightbox-content" id="lightbox-img">
</div>

<script type="module">
async function loadNavbar() {
try {
const response = await fetch('navbar.html');
const navbarHTML = await response.text();
document.getElementById('navbar-container').innerHTML = navbarHTML;
const script = document.createElement('script');
script.src = 'navbar.js';
document.body.appendChild(script);
} catch (error) {
console.error('Error loading navbar:', error);
}
}

async function loadGallery() {
try {
const response = await fetch('/public/images.json');
const images = await response.json();

const imageGrid = document.getElementById('image-grid');
const imageCount = document.getElementById('image-count');

imageCount.textContent = `${images.length} images`;

imageGrid.innerHTML = '';

images.forEach((image, index) => {
const card = document.createElement('div');
card.className = 'image-card';
card.innerHTML = `
<img src="/public/${image.path}" alt="${image.filename}" loading="lazy">
<div class="image-filename">${image.filename}</div>
`;

card.addEventListener('click', () => {
openLightbox(`/public/${image.path}`);
});

imageGrid.appendChild(card);
});

console.log('✅ Loaded ' + images.length + ' images');
} catch (error) {
console.error('❌ Error loading images:', error);
document.getElementById('image-grid').innerHTML = 
'<div class="loading">Error loading images</div>';
}
}

function openLightbox(src) {
const lightbox = document.getElementById('lightbox');
const img = document.getElementById('lightbox-img');
img.src = src;
lightbox.classList.add('active');
}

function closeLightbox() {
const lightbox = document.getElementById('lightbox');
lightbox.classList.remove('active');
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', (e) => {
if (e.target.id === 'lightbox') closeLightbox();
});

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeLightbox();
});

loadNavbar();
loadGallery();
</script>
</body>
</html>
