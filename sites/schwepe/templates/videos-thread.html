  const scale = Math.min(1, windowWidth / width);

  function slapTV() {
  const videos = [document.getElementById('currentVideo'), document.getElementById('nextVideo'), document.getElementById('thirdVideo')];
  videos.forEach(video => {
  if (video) {
  video.volume = Math.random();
  }
  });
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const staticDuration = 0.2;
  const thudTime = staticDuration;
  const whineDuration = 0.3;
  const whineTime = thudTime + 0.1;
  const createNoise = (duration, startTime) => {
  const bufferSize = audioContext.sampleRate * duration;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
  data[i] = Math.random() * 2 - 1;
  }
  const noise = audioContext.createBufferSource();
  noise.buffer = buffer;
  const gainNode = audioContext.createGain();
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + startTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + startTime + duration);
  noise.connect(gainNode);
  gainNode.connect(audioContext.destination);
  noise.start(audioContext.currentTime + startTime);
  };
  const createThud = (startTime) => {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(60, audioContext.currentTime + startTime);
  oscillator.frequency.exponentialRampToValueAtTime(30, audioContext.currentTime + startTime + 0.15);
  gainNode.gain.setValueAtTime(0.5, audioContext.currentTime + startTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + startTime + 0.15);
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  oscillator.start(audioContext.currentTime + startTime);
  oscillator.stop(audioContext.currentTime + startTime + 0.15);
  };
  const createWhine = (startTime) => {
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(800, audioContext.currentTime + startTime);
  oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + startTime + whineDuration);
  gainNode.gain.setValueAtTime(0.2, audioContext.currentTime + startTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + startTime + whineDuration);
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  oscillator.start(audioContext.currentTime + startTime);
  oscillator.stop(audioContext.currentTime + startTime + whineDuration);
  };
  createNoise(staticDuration, 0);
  createThud(thudTime);
  createWhine(whineTime);
  }

  scaleToFit();
