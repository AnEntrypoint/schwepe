<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>schwepe - Image Archive | Visual Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="navbar.css">
    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #ff006e;
            --accent: #ffbe0b;
            --bg-dark: #0a0a0a;
            --tv-bezel: #2a2a2a;
            --tv-screen: #1a1a1a;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            text-align: center;
            padding: 160px 0 60px;
            position: relative;
        }

        .page-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--secondary), var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .gallery-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .pagination-info {
            background: rgba(0, 245, 255, 0.1);
            padding: 10px 20px;
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--primary);
            font-family: 'VT323', monospace;
        }

        .pagination-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .pagination-btn {
            background: rgba(0, 245, 255, 0.05);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(0, 245, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
            margin-bottom: 60px;
        }

        .media-item {
            background: rgba(0, 245, 255, 0.05);
            border: 2px solid var(--primary);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .media-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 245, 255, 0.3);
            background: rgba(0, 245, 255, 0.1);
        }

        .media-container {
            width: 100%;
            height: 250px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .media-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .media-item:hover .media-container img {
            transform: scale(1.05);
        }

        .media-info {
            padding: 18px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid rgba(0, 245, 255, 0.3);
        }

        .media-filename {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 8px;
            word-break: break-all;
            font-weight: 600;
            font-family: 'VT323', monospace;
        }

        .media-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            opacity: 0.8;
        }

        .media-size {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 5px;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            animation: modalFadeIn 0.3s ease;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--secondary);
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9001;
        }

        .modal-close:hover {
            background: var(--accent);
            transform: scale(1.1) rotate(90deg);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--secondary);
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .header {
                padding: 120px 15px 40px;
            }

            .page-title {
                font-size: 2.8rem;
            }

            .page-subtitle {
                font-size: 1.2rem;
            }

            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 15px 0;
            }

            .gallery-controls {
                flex-direction: column;
                gap: 15px;
            }

            .pagination-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="container">
        <div class="header">
            <h1 class="page-title">Image Archive</h1>
            <p class="page-subtitle">[ Visual Data Repository • Chronological Archive ]</p>
        </div>

        <div class="gallery-controls">
            <div class="pagination-controls">
                <button class="pagination-btn" id="prev-btn" onclick="changePage(-1)">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="pagination-info" id="pagination-info">Loading...</div>
                <button class="pagination-btn" id="next-btn" onclick="changePage(1)">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="media-container" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading images...
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <img id="modal-image" src="" alt="Full size image">
        </div>
    </div>

    <script>
        class ImagesGallery {
            constructor() {
                this.currentPage = 1;
                this.itemsPerPage = 20;
                this.allImages = [];
                this.filteredImages = [];
                this.isLoading = false;
            }

            async init() {
                try {
                    await this.loadImages();
                    this.renderGallery();
                    this.setupEventListeners();
                } catch (error) {
                    this.showError('Failed to load images: ' + error.message);
                }
            }

            async loadImages() {
                this.isLoading = true;
                try {
                    const response = await fetch('/saved_images.json');
                    if (!response.ok) throw new Error('Failed to fetch images');

                    const images = await response.json();
                    this.allImages = images.sort((a, b) => new Date(b.date) - new Date(a.date));
                    this.filteredImages = [...this.allImages];
                } catch (error) {
                    // Fallback to static listing if JSON fails
                    await this.loadStaticImages();
                }
                this.isLoading = false;
            }

            async loadStaticImages() {
                // This is a local upload method for development use
                const staticImages = [
                    { filename: '2025-10-02T07-18-18-318Z_oliver.jpg', date: '2025-10-02T07-18-18-318Z', size: 59092 },
                    { filename: '2025-10-02T07-18-19-174Z_give-him-a-schwepe.jpg', date: '2025-10-02T07-18-19-174Z', size: 38524 },
                    { filename: '2025-10-02T07-18-20-192Z_table.jpg', date: '2025-10-02T07-18-20-192Z', size: 174685 },
                    // Add more as needed - this would be dynamically generated
                ];

                this.allImages = staticImages.sort((a, b) => new Date(b.date) - new Date(a.date));
                this.filteredImages = [...this.allImages];
            }

            renderGallery() {
                const container = document.getElementById('media-container');
                const startIndex = (this.currentPage - 1) * this.itemsPerPage;
                const endIndex = startIndex + this.itemsPerPage;
                const pageImages = this.filteredImages.slice(startIndex, endIndex);

                if (pageImages.length === 0) {
                    container.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> No images found</div>';
                    return;
                }

                const mediaGrid = document.createElement('div');
                mediaGrid.className = 'media-grid';

                pageImages.forEach(image => {
                    const mediaItem = document.createElement('div');
                    mediaItem.className = 'media-item';

                    const formattedDate = this.formatDate(image.date);
                    const formattedSize = this.formatFileSize(image.size);

                    mediaItem.innerHTML = `
                        <div class="media-container" onclick="openModal('/saved_images/${image.filename}')">
                            <img src="/saved_images/${image.filename}" alt="${image.filename}" loading="lazy">
                        </div>
                        <div class="media-info">
                            <div class="media-filename">${image.filename}</div>
                            <div class="media-date">${formattedDate}</div>
                            <div class="media-size">${formattedSize}</div>
                        </div>
                    `;

                    mediaGrid.appendChild(mediaItem);
                });

                container.innerHTML = '';
                container.appendChild(mediaGrid);
                this.updatePagination();
            }

            updatePagination() {
                const totalPages = Math.ceil(this.filteredImages.length / this.itemsPerPage);
                const startItem = (this.currentPage - 1) * this.itemsPerPage + 1;
                const endItem = Math.min(this.currentPage * this.itemsPerPage, this.filteredImages.length);

                document.getElementById('pagination-info').textContent =
                    `${startItem}-${endItem} of ${this.filteredImages.length} • Page ${this.currentPage}/${totalPages}`;

                document.getElementById('prev-btn').disabled = this.currentPage <= 1;
                document.getElementById('next-btn').disabled = this.currentPage >= totalPages;
            }

            changePage(direction) {
                const totalPages = Math.ceil(this.filteredImages.length / this.itemsPerPage);
                const newPage = this.currentPage + direction;

                if (newPage >= 1 && newPage <= totalPages) {
                    this.currentPage = newPage;
                    this.renderGallery();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.changePage(-1);
                    if (e.key === 'ArrowRight') this.changePage(1);
                    if (e.key === 'Escape') closeModal();
                });

                document.getElementById('modal').addEventListener('click', (e) => {
                    if (e.target.id === 'modal') closeModal();
                });
            }

            showError(message) {
                document.getElementById('media-container').innerHTML =
                    `<div class="error"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
            }
        }

        // Global functions for onclick handlers
        let gallery;

        function changePage(direction) {
            gallery.changePage(direction);
        }

        function openModal(imageSrc) {
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modal-image');
            modalImage.src = imageSrc;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Load navbar function
        async function loadNavbar() {
            try {
                const response = await fetch('navbar.html');
                const navbarHTML = await response.text();
                document.getElementById('navbar-container').innerHTML = navbarHTML;
                const script = document.createElement('script');
                script.src = 'navbar.js';
                document.body.appendChild(script);
                const navLinks = document.querySelectorAll('#navbar-container a');
                navLinks.forEach(link => {
                    if (link.href.includes('images-thread.html')) {
                        link.classList.add('active');
                    }
                });
            } catch (error) {
                console.error('Error loading navbar:', error);
            }
        }

        // Initialize gallery when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            loadNavbar();
            gallery = new ImagesGallery();
            gallery.init();
        });
    </script>
</body>
</html>
