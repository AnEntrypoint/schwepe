<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="site-id" content="{{ id }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schwepe Images Thread - Chronological Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site-assets/styles/navbar.css">
<style>
:root {
--primary: #00f5ff;
--secondary: #ff006e;
--accent: #ffbe0b;
--bg-dark: #0a0a0a;
--bg-card: rgba(255, 255, 255, 0.05);
--text: #ffffff;
--border: rgba(255, 255, 255, 0.1);
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
font-family: 'Fredoka', sans-serif;
background: var(--bg-dark);
color: var(--text);
overflow-x: hidden;
min-height: 100vh;
}
.hero-section {
padding: 120px 20px 60px;
text-align: center;
background: linear-gradient(135deg, rgba(0, 245, 255, 0.1) 0%, rgba(255, 0, 110, 0.1) 100%);
position: relative;
}
.hero-title {
font-size: clamp(2.5rem, 5vw, 4rem);
font-weight: 700;
margin-bottom: 20px;
background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
}
.hero-subtitle {
font-size: 1.3rem;
opacity: 0.9;
margin-bottom: 30px;
color: var(--primary);
}
.gallery-controls {
display: flex;
justify-content: center;
align-items: center;
gap: 20px;
margin: 30px 0;
flex-wrap: wrap;
}
.pagination-info {
background: var(--bg-card);
padding: 12px 24px;
border-radius: 25px;
border: 1px solid var(--border);
font-size: 0.9rem;
color: var(--primary);
}
.pagination-controls {
display: flex;
gap: 10px;
align-items: center;
}
.pagination-btn {
background: var(--bg-card);
border: 1px solid var(--border);
color: var(--text);
padding: 10px 20px;
border-radius: 20px;
cursor: pointer;
transition: all 0.3s ease;
font-family: 'Fredoka', sans-serif;
font-weight: 500;
}
.pagination-btn:hover:not(:disabled) {
background: var(--primary);
color: var(--bg-dark);
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(0, 245, 255, 0.3);
}
.pagination-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}
.media-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
gap: 25px;
padding: 20px;
max-width: 1400px;
margin: 0 auto;
}
.media-item {
background: var(--bg-card);
border: 1px solid var(--border);
border-radius: 15px;
overflow: hidden;
transition: all 0.3s ease;
position: relative;
backdrop-filter: blur(10px);
}
.media-item:hover {
transform: translateY(-5px);
box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2);
border-color: var(--primary);
}
.media-container {
width: 100%;
height: 250px;
position: relative;
overflow: hidden;
cursor: pointer;
}
.media-container img {
width: 100%;
height: 100%;
object-fit: cover;
transition: transform 0.3s ease;
}
.media-item:hover .media-container img {
transform: scale(1.05);
}
.media-info {
padding: 15px;
background: rgba(0, 0, 0, 0.7);
backdrop-filter: blur(10px);
}
.media-filename {
font-size: 0.9rem;
color: var(--primary);
margin-bottom: 8px;
word-break: break-all;
font-weight: 500;
}
.media-date {
font-size: 0.8rem;
color: var(--text);
opacity: 0.7;
}
.media-size {
font-size: 0.8rem;
color: var(--accent);
margin-top: 5px;
}
.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.9);
z-index: 9000;
justify-content: center;
align-items: center;
backdrop-filter: blur(10px);
}
.modal-content {
max-width: 90vw;
max-height: 90vh;
position: relative;
animation: modalFadeIn 0.3s ease;
}
.modal-content img {
width: 100%;
height: 100%;
object-fit: contain;
border-radius: 10px;
}
.modal-close {
position: absolute;
top: 20px;
right: 20px;
background: var(--bg-card);
border: 1px solid var(--border);
color: var(--text);
padding: 10px;
border-radius: 50%;
cursor: pointer;
transition: all 0.3s ease;
font-size: 1.2rem;
width: 45px;
height: 45px;
display: flex;
align-items: center;
justify-content: center;
}
.modal-close:hover {
background: var(--secondary);
transform: scale(1.1);
}
.loading {
text-align: center;
padding: 50px;
font-size: 1.2rem;
color: var(--primary);
}
.error {
text-align: center;
padding: 50px;
font-size: 1.2rem;
color: var(--secondary);
}
@keyframes modalFadeIn {
from { opacity: 0; transform: scale(0.9); }
to { opacity: 1; transform: scale(1); }
}
@media (max-width: 768px) {
.hero-section {
padding: 100px 15px 40px;
}
.media-grid {
grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
gap: 15px;
padding: 15px;
}
.gallery-controls {
flex-direction: column;
gap: 15px;
}
.pagination-controls {
flex-wrap: wrap;
justify-content: center;
}
}
</style>
</head>
<body>
<div id="navbar-container"></div>
<section class="hero-section">
<h1 class="hero-title">
<i class="fas fa-images"></i> Schwepe Images Thread
</h1>
<p class="hero-subtitle">Chronological gallery of saved images</p>
<div class="gallery-controls">
<div class="pagination-info" id="pagination-info">
Loading...
</div>
<div class="pagination-controls">
<button class="pagination-btn" id="prev-btn" onclick="changePage(-1)">
<i class="fas fa-chevron-left"></i> Previous
</button>
<button class="pagination-btn" id="next-btn" onclick="changePage(1)">
Next <i class="fas fa-chevron-right"></i>
</button>
</div>
</div>
</section>
<main>
<div id="media-container" class="loading">
<i class="fas fa-spinner fa-spin"></i> Loading images...
</div>
</main>
<div id="modal" class="modal">
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">
<i class="fas fa-times"></i>
</button>
<img id="modal-image" src="" alt="Full size image">
</div>
</div>
<script>
class ImagesGallery {
constructor() {
this.currentPage = 1;
this.itemsPerPage = 20;
this.allImages = [];
this.filteredImages = [];
this.isLoading = false;
}
async init() {
try {
await this.loadImages();
this.renderGallery();
this.setupEventListeners();
} catch (error) {
this.showError('Failed to load images: ' + error.message);
}
}
async loadImages() {
this.isLoading = true;
try {
const response = await fetch('/saved_images.json');
if (!response.ok) throw new Error('Failed to fetch images');
const images = await response.json();
this.allImages = images.sort((a, b) => new Date(b.date) - new Date(a.date));
this.filteredImages = [...this.allImages];
} catch (error) {
// Fallback to static listing if JSON fails
await this.loadStaticImages();
}
this.isLoading = false;
}
async loadStaticImages() {
// This is a fallback method - in production you'd have a proper API endpoint
const staticImages = [
{ filename: '2025-10-02T07-18-18-318Z_oliver.jpg', date: '2025-10-02T07-18-18-318Z', size: 59092 },
{ filename: '2025-10-02T07-18-19-174Z_give-him-a-schwepe.jpg', date: '2025-10-02T07-18-19-174Z', size: 38524 },
{ filename: '2025-10-02T07-18-20-192Z_table.jpg', date: '2025-10-02T07-18-20-192Z', size: 174685 },
// Add more as needed - this would be dynamically generated
];
this.allImages = staticImages.sort((a, b) => new Date(b.date) - new Date(a.date));
this.filteredImages = [...this.allImages];
}
renderGallery() {
const container = document.getElementById('media-container');
const startIndex = (this.currentPage - 1) * this.itemsPerPage;
const endIndex = startIndex + this.itemsPerPage;
const pageImages = this.filteredImages.slice(startIndex, endIndex);
if (pageImages.length === 0) {
container.innerHTML = '<div class="error"><i class="fas fa-exclamation-triangle"></i> No images found</div>';
return;
}
const mediaGrid = document.createElement('div');
mediaGrid.className = 'media-grid';
pageImages.forEach(image => {
const mediaItem = document.createElement('div');
mediaItem.className = 'media-item';
const formattedDate = this.formatDate(image.date);
const formattedSize = this.formatFileSize(image.size);
mediaItem.innerHTML = `
<div class="media-container" onclick="openModal('//site-assets/media/saved_images/${image.filename}')">
<img src="//site-assets/media/saved_images/${image.filename}" alt="${image.filename}" loading="lazy">
</div>
<div class="media-info">
<div class="media-filename">${image.filename}</div>
<div class="media-date">${formattedDate}</div>
<div class="media-size">${formattedSize}</div>
</div>
`;
mediaGrid.appendChild(mediaItem);
});
container.innerHTML = '';
container.appendChild(mediaGrid);
this.updatePagination();
}
updatePagination() {
const totalPages = Math.ceil(this.filteredImages.length / this.itemsPerPage);
const startItem = (this.currentPage - 1) * this.itemsPerPage + 1;
const endItem = Math.min(this.currentPage * this.itemsPerPage, this.filteredImages.length);
document.getElementById('pagination-info').textContent =
`Showing ${startItem}-${endItem} of ${this.filteredImages.length} images (Page ${this.currentPage}/${totalPages})`;
document.getElementById('prev-btn').disabled = this.currentPage <= 1;
document.getElementById('next-btn').disabled = this.currentPage >= totalPages;
}
changePage(direction) {
const totalPages = Math.ceil(this.filteredImages.length / this.itemsPerPage);
const newPage = this.currentPage + direction;
if (newPage >= 1 && newPage <= totalPages) {
this.currentPage = newPage;
this.renderGallery();
window.scrollTo({ top: 0, behavior: 'smooth' });
}
}
formatDate(dateString) {
const date = new Date(dateString);
return date.toLocaleString('en-US', {
year: 'numeric',
month: 'short',
day: 'numeric',
hour: '2-digit',
minute: '2-digit'
});
}
formatFileSize(bytes) {
if (bytes === 0) return '0 B';
const k = 1024;
const sizes = ['B', 'KB', 'MB', 'GB'];
const i = Math.floor(Math.log(bytes) / Math.log(k));
return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}
setupEventListeners() {
document.addEventListener('keydown', (e) => {
if (e.key === 'ArrowLeft') this.changePage(-1);
if (e.key === 'ArrowRight') this.changePage(1);
if (e.key === 'Escape') closeModal();
});
document.getElementById('modal').addEventListener('click', (e) => {
if (e.target.id === 'modal') closeModal();
});
}
showError(message) {
document.getElementById('media-container').innerHTML =
`<div class="error"><i class="fas fa-exclamation-triangle"></i> ${message}</div>`;
}
}
// Global functions for onclick handlers
let gallery;
function changePage(direction) {
gallery.changePage(direction);
}
function openModal(imageSrc) {
const modal = document.getElementById('modal');
const modalImage = document.getElementById('modal-image');
modalImage.src = imageSrc;
modal.style.display = 'flex';
}
function closeModal() {
document.getElementById('modal').style.display = 'none';
}
// Load shared navbar
async function loadNavbar() {
try {
const response = await fetch('navbar.html');
const navbarHTML = await response.text();
document.getElementById('navbar-container').innerHTML = navbarHTML;
// Load navbar JavaScript
const script = document.createElement('script');
script.src = 'navbar.js';
document.body.appendChild(script);
// Set active navigation state
const navLinks = document.querySelectorAll('#navbar-container a');
navLinks.forEach(link => {
if (link.href.includes('images-thread.html')) {
link.classList.add('active');
}
});
} catch (error) {
console.error('❌ Error loading navbar:', error);
}
}
// Initialize gallery and navbar when DOM is loaded
document.addEventListener('DOMContentLoaded', () => {
loadNavbar();
gallery = new ImagesGallery();
gallery.init();
});
</script>
</body>
</html>
