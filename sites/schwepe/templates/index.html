   <meta name="description" content="{{ meta.description }}">
   <meta name="keywords" content="{{ meta.keywords }}">
   <meta name="author" content="{{ meta.author }}">
   <meta name="robots" content="index, follow">

   <meta property="og:type" content="website">
   <meta property="og:url" content="https://{{ domain }}/">

   <meta property="og:image:height" content="400">
   <meta property="og:site_name" content="Schwepe's Meme Dimension">
   <meta property="og:locale" content="en_US">

   <meta name="twitter:card" content="summary_large_image">
   <meta name="twitter:site" content="{{ meta.twitter }}">
   <meta name="twitter:creator" content="{{ meta.twitter }}">
   <meta name="twitter:title" content="Schwepe's Meme Dimension - 247420 Degen Energy & Meme Culture">
   <meta name="twitter:description" content="{{ meta.description }}">
   <meta name="twitter:image" content="https://{{ domain }}{{ meta.ogImage }}">

   <meta name="msapplication-TileColor" content="{{ meta.themeColor }}">

   <script type="application/ld+json">
   {
   "@context": "https://schema.org",
   "@type": "WebSite",
   "name": "Schwepe's Meme Dimension",
   "description": "{{ meta.description }}",
   "url": "https://{{ domain }}/",
   "image": "https://{{ domain }}{{ meta.ogImage }}",
   "author": {
   "@type": "Organization",
   "name": "{{ meta.author }}"
   },
   "potentialAction": {
   "@type": "SearchAction",
   "target": "https://{{ domain }}/search?q={search_term_string}",
   "query-input": "required name=search_term_string"
   },
   "sameAs": [
   "https://twitter.com/schwepe",
   ]
   }
   </script>

   <style>
   * {
   margin: 0;
   padding: 0;
   box-sizing: border-box;
   }
   body {
   font-family: 'Fredoka', sans-serif;
   background: linear-gradient(135deg, {{ meta.themeColor }} 0%, #34495e 100%);
   min-height: 100vh;
   overflow-x: hidden;
   position: relative;
   }
   .animated-bg {
   position: fixed;
   top: 0;
   left: 0;
   width: 100%;
   height: 100%;
   z-index: -1;
   background: linear-gradient(135deg, {{ meta.themeColor }} 0%, #34495e 100%);
   animation: bgShift 15s ease-in-out infinite;
   }
   @keyframes bgShift {
   0%, 100% { background: linear-gradient(135deg, {{ meta.themeColor }} 0%, #34495e 100%); }
   25% { background: linear-gradient(135deg, #16a085 0%, #27ae60 100%); }
   50% { background: linear-gradient(135deg, #2980b9 0%, #3498db 100%); }
   75% { background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%); }
   }
   .floating-shapes {
   position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  }
  .shape {
  position: absolute;
  border-radius: 50%;
  animation: float 6s ease-in-out infinite;
  }
  .shape:nth-child(1) {
  width: 80px;
  height: 80px;
  background: rgba(255, 255, 255, 0.1);
  top: 10%;
  left: 10%;
  animation-delay: 0s;
  }
  .shape:nth-child(2) {
  width: 120px;
  height: 120px;
  background: rgba(255, 255, 255, 0.05);
  top: 60%;
  right: 10%;
  animation-delay: 2s;
  }
  .shape:nth-child(3) {
  width: 60px;
  height: 60px;
  background: rgba(255, 255, 255, 0.08);
  bottom: 20%;
  left: 20%;
  animation-delay: 4s;
  }
  @keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(180deg); }
  }
