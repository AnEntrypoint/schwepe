<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwepe Lore - The Complete Saga</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/lore.css">
    <script src="/static/lore-engine.js" type="module"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color: #ffffff;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            animation: bgShift 15s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); }
            25% { background: linear-gradient(135deg, #16a085 0%, #27ae60 100%); }
            50% { background: linear-gradient(135deg, #2980b9 0%, #3498db 100%); }
            75% { background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .navbar a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .navbar i {
            font-size: 16px;
        }

        .header {
            text-align: center;
            padding: 120px 0 60px;
        }

        .lore-title {
            font-size: 4rem;
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            line-height: 1.1;
        }

        .lore-subtitle {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .lore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .lore-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .lore-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .lore-card:hover::before {
            left: 100%;
        }

        .lore-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(240, 147, 251, 0.5);
        }

        .lore-card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
            text-align: center;
        }

        .lore-card h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #f093fb;
            text-align: center;
        }

        .lore-card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 20px;
        }

        .lore-card-topics {
            list-style: none;
            text-align: center;
        }

        .lore-card-topics li {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            margin: 5px 0;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .start-here {
            text-align: center;
            margin: 60px 0;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            padding: 20px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .progress-indicator {
            text-align: center;
            margin: 40px 0;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .progress-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .progress-dot:hover {
            background: rgba(240, 147, 251, 0.8);
            transform: scale(1.2);
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(240, 147, 251, 0.5); }
            50% { text-shadow: 0 0 20px rgba(240, 147, 251, 0.8); }
        }

        .glow-text {
            animation: glow 2s ease-in-out infinite;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-wrap: wrap;
                max-width: 90%;
                gap: 10px;
            }

            .navbar a {
                padding: 8px 12px;
                font-size: 14px;
            }

            .lore-title {
                font-size: 2.5rem;
            }

            .lore-subtitle {
                font-size: 1.3rem;
            }

            .header {
                padding: 100px 0 40px;
            }

            .lore-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .lore-card {
                padding: 30px 20px;
            }

            .cta-button {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <!-- Navigation -->
    <div id="navbar-container"></div>

    <div class="container">
        <div class="header">
            <h1 class="lore-title glow-text" id="main-title">🚀🐸 Schwepe Lore Library 🐸🚀</h1>
            <p class="lore-subtitle" id="main-subtitle">Choose Your Chapter in the Saga of 247420</p>
        </div>

        <div id="dynamic-lore-nav"></div>

        <div id="lore-chapters-container">
        </div>

        <div class="start-here">
            <p style="font-size: 1.3rem; margin-bottom: 30px; color: rgba(255, 255, 255, 0.9);">
                New to the Schwepe universe? <span id="random-lore-snippet">Click to discover your destiny...</span>
            </p>
            <a href="#intro" class="cta-button" id="start-journey">
                <i class="fas fa-play"></i> Begin Your Journey
            </a>
        </div>
    </div>

    <script>
        // Stats function
        function showStats() {
            const statsContent = `
                <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;">
                    <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; max-width: 500px; width: 90%; text-align: center; color: white; border: 1px solid rgba(255,255,255,0.2);">
                        <h2 style="margin-bottom: 20px; color: #f093fb;">🚀 Schwepe Stats 🚀</h2>
                        <div style="font-size: 1.2rem; line-height: 1.8;">
                            <p>🐸 Total Schwepes: 28 Unique Frogs</p>
                            <p>💎 Diamond Hands: Infinite</p>
                            <p>🎯 Memes Created: Countless</p>
                            <p>🌙 Moonshots: Many</p>
                            <p>💀 Bags Held: All of them</p>
                            <p>⚡ Degeneracy Level: Maximum</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.remove()" style="margin-top: 20px; padding: 10px 20px; background: #f093fb; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer;">Close Stats</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', statsContent);
        }

        // Load shared navbar
        async function loadNavbar() {
            try {
                const response = await fetch('navbar.html');
                const navbarHTML = await response.text();
                document.getElementById('navbar-container').innerHTML = navbarHTML;

                // Set active state for current page
                const currentPage = window.location.pathname.split('/').pop() || 'index.html';
                const navLinks = document.querySelectorAll('#navbar-container a');
                navLinks.forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });

                console.log('✅ Navbar loaded successfully');
            } catch (error) {
                console.error('❌ Error loading navbar:', error);
            }
        }

        // Initialize dynamic lore system
        async function initializeLoreSystem() {
            try {
                // Wait for lore engine to initialize
                if (window.loreEngine && window.loreEngine.loreData) {
                    renderDynamicLore();
                } else {
                    // Wait a bit and try again
                    setTimeout(initializeLoreSystem, 100);
                }
            } catch (error) {
                console.error('❌ Error initializing lore system:', error);
            }
        }

        function renderDynamicLore() {
            const chapters = window.loreEngine.getAllChapters();
            const container = document.getElementById('lore-chapters-container');
            const navContainer = document.getElementById('dynamic-lore-nav');

            if (!container || !navContainer) return;

            // Render navigation
            navContainer.innerHTML = `
                <div class="progress-indicator">
                    <p>📚 Complete Schwepe Saga (${chapters.length} Chapters)</p>
                    <div class="progress-dots">
                        ${chapters.map((chapter, index) =>
                            `<div class="progress-dot" title="${chapter.title}" data-chapter="${chapter.id}" onclick="scrollToChapter('${chapter.id}')"></div>`
                        ).join('')}
                    </div>
                </div>
            `;

            // Render chapter cards
            container.innerHTML = chapters.map(chapter => {
                const theme = window.loreEngine.getThemeConfig(chapter.theme);
                return `
                    <a href="#${chapter.id}" class="lore-card" data-chapter="${chapter.id}" onclick="scrollToChapter('${chapter.id}')">
                        <span class="lore-card-icon">${chapter.icon}</span>
                        <h3>${chapter.title}</h3>
                        <p>${chapter.subtitle}</p>
                        <div class="lore-card-mood">${chapter.mood}</div>
                    </a>
                `;
            }).join('');

            // Update random lore snippet
            updateRandomLoreSnippet();
        }

        function scrollToChapter(chapterId) {
            const chapter = window.loreEngine.getChapter(chapterId);
            if (chapter) {
                // Store chapter data for modal or navigate to detailed view
                localStorage.setItem('currentChapter', JSON.stringify(chapter));
                // For now, let's show the chapter content in a modal
                showChapterModal(chapter);
            }
        }

        function showChapterModal(chapter) {
            const theme = window.loreEngine.getThemeConfig(chapter.theme);
            const modalHTML = `
                <div class="chapter-modal" data-theme="${chapter.theme}">
                    <div class="modal-content">
                        <div class="modal-close">
                            <button onclick="this.closest('.chapter-modal').remove()" class="close-button">×</button>
                        </div>
                        ${window.loreEngine.generateLoreHTML(chapter.id)}
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function updateRandomLoreSnippet() {
            const snippet = window.loreEngine.getRandomLoreSnippet();
            const snippetElement = document.getElementById('random-lore-snippet');
            if (snippetElement && snippet) {
                snippetElement.textContent = snippet;
            }
        }

        // Set active navigation and load navbar
        document.addEventListener('DOMContentLoaded', function() {
            // Load shared navbar
            loadNavbar();

            // Initialize lore system
            setTimeout(initializeLoreSystem, 500);

            // Update random lore snippet every 10 seconds
            setInterval(updateRandomLoreSnippet, 10000);

            // Random lore snippet click handler
            document.getElementById('random-lore-snippet')?.addEventListener('click', updateRandomLoreSnippet);
        });
    </script>
</body>
</html>
