<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cornerman Transparency Test</title>
    <style>
        body {
            background: linear-gradient(45deg, red, blue, green, yellow);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .cornerman {
            width: 120px;
            height: 120px;
            border: 2px solid white;
            border-radius: 10px;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Cornerman Transparency Test</h1>
    <div class="container">
        <img src="cornermen/schwepe-corner-001.png" alt="Cornerman 1" class="cornerman">
        <img src="cornermen/schwepe-corner-010.png" alt="Cornerman 10" class="cornerman">
        <img src="cornermen/schwepe-corner-020.png" alt="Cornerman 20" class="cornerman">
        <img src="cornermen/schwepe-corner-030.png" alt="Cornerman 30" class="cornerman">
        <img src="cornermen/schwepe-corner-040.png" alt="Cornerman 40" class="cornerman">
        <img src="cornermen/schwepe-corner-050.png" alt="Cornerman 50" class="cornerman">
    </div>
</body>
</html>
