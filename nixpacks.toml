[phases.build]
cmds = ['npm run build']

[phases.start]
cmd = 'npm start'

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
port = 3000

