[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"
NPM_CONFIG_PRODUCTION = "false"

[build.args]
NIXPACKS_DOCKERFILE = "./Dockerfile.coolify"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "always"
restartPolicyMaxRetries = 10
