[phases.setup]
nixPkgs = ["...", "nodejs_20", "npm"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "always"
restartPolicyMaxRetries = 10