# Nixpacks configuration for Coolify deployment
[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[phases.install]
cmds = ["npm ci --only=production"]

[phases.build]
dependsOn = ["install"]
cmds = ["rm -rf dist || true", "npm run build:multi-site"]

[phases.start]
dependsOn = ["build"]
cmds = ["NODE_ENV=production node server.cjs"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
port = 3000
