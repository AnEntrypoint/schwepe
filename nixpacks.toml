# Nixpacks configuration for Coolify deployment
[variables]
NIXPACKS_VERSION = "1.0.11"
NODE_ENV = "production"

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[phases.start]
cmds = ["npm start"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
port = 3000
