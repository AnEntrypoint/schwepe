# Nixpacks configuration for Coolify deployment
# Fixed for Node.js application deployment (not static files)

[variables]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"

[phases.build]
cmds = [
  "npm ci --only=production",
  "npm run build"
]

[phases.start]
cmd = "node server.js"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
port = 3000
healthCheckPort = 3000

# Multi-site Node.js application deployment fix - 2025-10-27T15:00:00.000Z
# Runs as Node.js application with domain routing and template engine
# Serves multiple sites: 247420.xyz and schwepe.247420.xyz