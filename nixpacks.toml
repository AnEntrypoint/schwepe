[phases.setup]
nixPkgs = ["nodejs_20", "git"]

[variables]
CI = "true"
NPM_CONFIG_UPDATE_NOTIFIER = "false"
NODE_ENV = "production"
PORT = "3000"

[phases.install]
cmds = [
  "rm -rf node_modules package-lock.json",
  "npm install --no-cache --prefer-offline --omit=dev"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "node server.js"
runPhases = ["install", "build", "start"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

